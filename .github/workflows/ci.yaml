name: Format, lint, and test

on:
  push:
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "py/**"
      - "assets/**"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  ARCFILE_TEST_DIR: ${{ github.workspace }}/assets/

jobs:
  format:
    name: Rust format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    name: Run linting + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Check toolchain
        shell: bash
        run: |
          rustup show
          rustup toolchain list
          cargo -V

      - name: Run Clippy
        shell: bash
        # TODO: Consider adding `-- -D warnings`
        run: cargo clippy --release

      - name: Run tests
        # TODO: enable integration tests when mock arcfile is added to repo
        run: cargo test --release --lib --workspace --exclude arcfile-mex

  python-tests:
    name: Run Python tests
    # TODO: enable Python tests when mock arcfile is added to repo
    if: false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # just test lower and upper bound
        python-version:
          - "3.10"
          - "3.14"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build & install the project
        run: uv build py/

      - name: Run tests
        run: uv run --with dist/*.whl pytest py/tests
