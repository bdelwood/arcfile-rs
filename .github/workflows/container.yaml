name: Build container image

on:
  push:
    paths:
      - Containerfile
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/arcfile-rs-build

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ env.IMAGE }}:latest
